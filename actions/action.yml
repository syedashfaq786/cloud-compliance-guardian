name: "Cloud-Compliance Guardian"
description: "AI-powered Terraform CIS Benchmark auditor using Cisco Sec-8B"
author: "Cloud-Compliance Guardian Team"

branding:
  icon: "shield"
  color: "blue"

inputs:
  sec8b_endpoint:
    description: "Sec-8B model endpoint URL (Ollama or vLLM)"
    required: true
    default: "http://localhost:11434"
  sec8b_model:
    description: "Model name to use"
    required: false
    default: "cisco-sec-8b"
  sec8b_backend:
    description: "Inference backend (ollama or vllm)"
    required: false
    default: "ollama"
  terraform_dir:
    description: "Path to Terraform files to scan"
    required: true
    default: "."
  severity_threshold:
    description: "Fail the check if findings at this severity or above are found (critical, high, medium, low)"
    required: false
    default: "critical"
  github_token:
    description: "GitHub token for posting PR comments"
    required: true
  database_url:
    description: "PostgreSQL connection string for storing results"
    required: false
    default: ""
  post_pr_comment:
    description: "Whether to post findings as PR comments (true/false)"
    required: false
    default: "true"

outputs:
  compliance_score:
    description: "Overall compliance score (0-100)"
  total_findings:
    description: "Total number of findings"
  critical_count:
    description: "Number of CRITICAL findings"
  audit_id:
    description: "Unique audit identifier"
  report_json:
    description: "Full audit report as JSON"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/../requirements.txt

    - name: Run compliance audit
      id: audit
      shell: bash
      env:
        SEC8B_ENDPOINT: ${{ inputs.sec8b_endpoint }}
        SEC8B_MODEL: ${{ inputs.sec8b_model }}
        SEC8B_BACKEND: ${{ inputs.sec8b_backend }}
        DATABASE_URL: ${{ inputs.database_url }}
      run: |
        cd ${{ github.action_path }}/..
        python -m auditor scan "${{ inputs.terraform_dir }}" --json > /tmp/audit_report.json 2>&1 || true

        # Extract key metrics
        SCORE=$(python -c "import json; r=json.load(open('/tmp/audit_report.json')); print(r.get('compliance_score', 0))")
        FINDINGS=$(python -c "import json; r=json.load(open('/tmp/audit_report.json')); print(r.get('total_findings', 0))")
        CRITICAL=$(python -c "import json; r=json.load(open('/tmp/audit_report.json')); print(r.get('severity_counts', {}).get('CRITICAL', 0))")
        AUDIT_ID=$(python -c "import json; r=json.load(open('/tmp/audit_report.json')); print(r.get('audit_id', 'unknown'))")

        echo "compliance_score=$SCORE" >> $GITHUB_OUTPUT
        echo "total_findings=$FINDINGS" >> $GITHUB_OUTPUT
        echo "critical_count=$CRITICAL" >> $GITHUB_OUTPUT
        echo "audit_id=$AUDIT_ID" >> $GITHUB_OUTPUT
        echo "report_json=$(cat /tmp/audit_report.json | jq -c '.')" >> $GITHUB_OUTPUT

    - name: Post PR review comments
      if: ${{ inputs.post_pr_comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        cd ${{ github.action_path }}
        python post_review.py /tmp/audit_report.json

    - name: Check severity threshold
      shell: bash
      run: |
        THRESHOLD="${{ inputs.severity_threshold }}"
        REPORT="/tmp/audit_report.json"

        CRITICAL=$(python -c "import json; r=json.load(open('$REPORT')); print(r.get('severity_counts', {}).get('CRITICAL', 0))")
        HIGH=$(python -c "import json; r=json.load(open('$REPORT')); print(r.get('severity_counts', {}).get('HIGH', 0))")
        MEDIUM=$(python -c "import json; r=json.load(open('$REPORT')); print(r.get('severity_counts', {}).get('MEDIUM', 0))")

        FAIL=0
        if [ "$THRESHOLD" = "critical" ] && [ "$CRITICAL" -gt 0 ]; then FAIL=1; fi
        if [ "$THRESHOLD" = "high" ] && [ $(($CRITICAL + $HIGH)) -gt 0 ]; then FAIL=1; fi
        if [ "$THRESHOLD" = "medium" ] && [ $(($CRITICAL + $HIGH + $MEDIUM)) -gt 0 ]; then FAIL=1; fi

        if [ "$FAIL" = "1" ]; then
          echo "::error::Compliance check failed! Findings at or above '$THRESHOLD' severity found."
          exit 1
        fi

        echo "✅ Compliance check passed."
